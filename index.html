<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamondbacks | Pro Baseball Gear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DIAMONDBACKS ⚾</div>
        <nav>
            <a href="#">Catálogo</a>
            <a href="#" class="btn-nav">Mi Carrito</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Equípate para Ganar</h1>
        </section>

        <section class="catalogo-container">
            <h2 class="section-title">Nuestra Selección Premium</h2>
            <div class="productos-grid" id="catalogo">
                <!-- AQUÍ VAN LOS PRODUCTOS. REPITE ESTE BLOQUE 30 VECES -->
                <div class="producto-card">
                    <img src="https://images.unsplash.com/photo-1530541930197-ff16ac917b0e?w=500" alt="Producto">
                    <div class="producto-info">
                        <span class="marca">Rawlings</span>
                        <h3>Guante Pro Preferred #1</h3>
                        <p class="precio">$5,899 MXN</p>
                        <button class="btn-add">Agregar</button>
                    </div>
                </div>
                <!-- Repite el bloque de arriba cambiando el nombre y la foto -->
            </div>
        </section>
    </main>
</body>
</html>
